<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — ConectaPUCP</title>
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    .login-btn {
      display:flex;align-items:center;justify-content:center;gap:12px;
      width:100%;padding:15px 24px;border-radius:12px;
      background:var(--clr-primary);color:white;border:none;
      font-size:1.125rem;font-weight:700;cursor:pointer;font-family:inherit;
      transition:background .15s,transform .1s,box-shadow .15s;
      box-shadow:0 4px 14px var(--clr-primary-glow);
      text-decoration:none;
    }
    .login-btn:hover { background:var(--clr-primary-dark);transform:translateY(-1px);box-shadow:0 6px 20px var(--clr-primary-glow);text-decoration:none;color:white; }
    .login-btn:active { transform:translateY(0); }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-panel" style="max-width:480px;margin:0 auto;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:52px;">
      <div class="brand-logo-icon" style="width:44px;height:44px;border-radius:10px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="12" r="3"/><circle cx="18" cy="8" r="2"/><line x1="11.8" y1="11" x2="16.4" y2="9.2"/></svg>
      </div>
      <div>
        <div style="font-size:1.125rem;font-weight:800;color:var(--clr-text);line-height:1;">Conecta<span style="color:var(--clr-primary);">PUCP</span></div>
        <div style="font-size:.75rem;color:var(--clr-text-subtle);font-weight:500;letter-spacing:.06em;">PLATAFORMA ACADÉMICA</div>
      </div>
    </div>

    <h1 style="font-size:1.75rem;font-weight:800;color:var(--clr-text);margin-bottom:8px;">Iniciar sesión</h1>
    <p style="font-size:.9375rem;color:var(--clr-text-muted);margin-bottom:24px;line-height:1.6;">Accede con tu correo institucional PUCP verificado por SSO CAS.</p>

    <div class="alert alert-danger" id="sessionAlert" role="alert" hidden style="margin-bottom:20px;">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>Sesión inválida. Por favor, vuelva a iniciar sesión.</span>
    </div>

    <a href="estudiante/repositorio.html" class="login-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Ingresar con SSO CAS (correo PUCP)
    </a>

    <p style="font-size:.75rem;color:var(--clr-text-subtle);margin-top:32px;text-align:center;">
      ConectaPUCP · PUCP 2025-2
    </p>
  </div>
</div>
<script>
if (new URLSearchParams(window.location.search).get('sesion') === 'invalida') {
  document.getElementById('sessionAlert').hidden = false;
}
</script>
<script src="assets/global.js"></script>
</body>
</html>
